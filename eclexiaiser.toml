# eclexiaiser manifest for TradeUnionist.jl

[project]
name = "TradeUnionist.jl"

[[functions]]
name = "main"
source = "src/main.rs"
energy-budget-mj = 300

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
