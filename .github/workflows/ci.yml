# SPDX-License-Identifier: MPL-2.0
name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11']
        os: [ubuntu-latest]
        include:
          - julia-version: '1.11'
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Install hyperpolymath-internal Julia deps from git
        # The deps Exnovation, BowtieRisk, PRComms are hyperpolymath
        # org-internal packages and are NOT in any Julia registry — the
        # `registries/General` subdir of hyperpolymath/julia-ecosystem is
        # just a mirror of upstream JuliaRegistries/General and doesn't
        # contain them. Install each from its git URL before
        # Pkg.instantiate() picks them up.
        run: |
          julia --project=. -e '
            using Pkg
            for (name, url) in [
              ("Exnovation", "https://github.com/hyperpolymath/Exnovation.jl"),
              ("BowtieRisk", "https://github.com/hyperpolymath/BowtieRisk.jl"),
              ("PRComms",    "https://github.com/hyperpolymath/PRComms.jl"),
            ]
              try
                Pkg.add(Pkg.PackageSpec(url=url))
              catch e
                @warn "Failed to add $name from $url" exception=(e, catch_backtrace())
                rethrow(e)
              end
            end
          '

      - name: Install, build, test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build(); Pkg.test()'
