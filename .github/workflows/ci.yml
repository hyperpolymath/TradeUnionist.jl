# SPDX-License-Identifier: MPL-2.0
name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11']
        os: [ubuntu-latest]
        include:
          - julia-version: '1.11'
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Install hyperpolymath-internal Julia deps from git
        # These hyperpolymath org-internal packages are NOT in any Julia
        # registry — the `registries/General` subdir of
        # hyperpolymath/julia-ecosystem is just a mirror of upstream
        # JuliaRegistries/General and doesn't contain them.
        #
        # The list is the transitive closure of internal deps from this
        # project's Project.toml: Exnovation, BowtieRisk, PRComms are
        # direct; AcceleratorGate is needed because BowtieRisk depends
        # on it. Install all in a SINGLE Pkg.add call so the resolver
        # knows about all the git sources at once.
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.add([
              Pkg.PackageSpec(url="https://github.com/hyperpolymath/Exnovation.jl"),
              Pkg.PackageSpec(url="https://github.com/hyperpolymath/BowtieRisk.jl"),
              Pkg.PackageSpec(url="https://github.com/hyperpolymath/PRComms.jl"),
              Pkg.PackageSpec(url="https://github.com/hyperpolymath/AcceleratorGate.jl"),
            ])
          '

      - name: Install, build, test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build(); Pkg.test()'
