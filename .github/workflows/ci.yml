# SPDX-License-Identifier: MPL-2.0
name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11']
        os: [ubuntu-latest]
        include:
          - julia-version: '1.11'
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Install hyperpolymath Julia registry
        shell: bash
        run: |
          # The hyperpolymath General registry lives at registries/General/
          # inside hyperpolymath/julia-ecosystem (a meta-repo). Julia Pkg
          # can't add a registry from a subdir directly, so clone the
          # meta-repo and copy the registry into the depot.
          mkdir -p ~/.julia/registries
          if [ ! -f ~/.julia/registries/HyperpolymathGeneral/Registry.toml ]; then
            git clone --depth=1 https://github.com/hyperpolymath/julia-ecosystem.git /tmp/julia-ecosystem
            cp -r /tmp/julia-ecosystem/registries/General ~/.julia/registries/HyperpolymathGeneral
          fi
          # Ensure the upstream Julia General registry is also present
          # (julia-actions/cache may have skipped it on a cold cache).
          julia -e 'using Pkg; try Pkg.Registry.add("General") catch end'

      - name: Install, build, test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build(); Pkg.test()'
