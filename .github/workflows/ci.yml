# SPDX-License-Identifier: MPL-2.0
name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.10', '1.11']
        os: [ubuntu-latest]
        include:
          - julia-version: '1.11'
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Install hyperpolymath Julia registry
        shell: bash
        run: |
          # The hyperpolymath General registry lives at registries/General/
          # inside hyperpolymath/julia-ecosystem (a meta-repo), so Julia
          # Pkg can't add it via a plain URL. Clone the meta-repo, init
          # the subdir as its own git repo, then register it via path.
          git clone --depth=1 https://github.com/hyperpolymath/julia-ecosystem.git /tmp/julia-ecosystem
          cd /tmp/julia-ecosystem/registries/General
          git init -q
          git add -A
          git -c user.email=ci@local -c user.name=ci commit -q -m snapshot
          julia -e '
            using Pkg
            # Ensure upstream General is present (cache may be cold).
            try Pkg.Registry.add("General") catch end
            # Install hyperpolymath General via local path. Julia 1.11
            # accepts a path containing Registry.toml; treats it as a
            # bare-clone-style registry source.
            Pkg.Registry.add(Pkg.RegistrySpec(path="/tmp/julia-ecosystem/registries/General"))
            Pkg.Registry.status()
          '

      - name: Install, build, test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build(); Pkg.test()'
